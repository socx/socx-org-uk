name: Deploy socx-org-uk

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-www
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=apps/web

      - name: Test API
        run: npm run test --workspace=apps/api --if-present

      - name: Package repo
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/release.tgz"
          tar --exclude='.git' --exclude='**/node_modules' -czf "$ARCHIVE_PATH" .
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Upload to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: ${{ env.ARCHIVE_PATH }}
          target: "/tmp"

      - name: Deploy and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_USER="$(id -un)"
            APP_DIR="/opt/apps/www"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$DEPLOY_USER:$DEPLOY_USER" "$APP_DIR"
            tar -xzf /tmp/release.tgz -C "$APP_DIR"
            rm -f /tmp/release.tgz

            cd "$APP_DIR"
            npm ci

            sudo systemctl daemon-reload
            for svc in www-web www-api www-worker; do
              if systemctl list-unit-files | grep -q "^${svc}\.service"; then
                sudo systemctl restart "$svc"
                sudo systemctl status "$svc" --no-pager
              fi
            done
