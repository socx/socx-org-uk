name: Deploy socx-org-uk

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-www
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=apps/web

      - name: Test API
        run: npm run test --workspace=apps/api --if-present

      - name: Package repo
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/release.tgz"
          tar --exclude='.git' --exclude='**/node_modules' -czf "$ARCHIVE_PATH" .
          cp "$ARCHIVE_PATH" ./release.tgz

      - name: Upload to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "release.tgz"
          target: "/tmp"

      - name: Deploy and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            
            # Try to setup Node.js environment
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              \. "$HOME/.nvm/nvm.sh"
              nvm use node || true
            fi
            
            # Fallback: add common Node paths
            export PATH="$HOME/.nvm/versions/node/*/bin:$HOME/node_modules/.bin:/usr/local/bin:/usr/bin:$PATH"
            
            # Verify npm is available
            npm --version || (echo "npm not found" && exit 1)
            
            DEPLOY_USER="$(id -un)"
            APP_DIR="/opt/apps/www"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$DEPLOY_USER:$DEPLOY_USER" "$APP_DIR"
            tar -xzf /tmp/release.tgz -C "$APP_DIR"
            rm -f /tmp/release.tgz

            cd "$APP_DIR"
            npm ci

            # Resolve node/npm absolute paths (needed for systemd, which doesn't expand $HOME)
            NODE_BIN="$(which node)"
            NPM_BIN="$(which npm)"

            # Create/update systemd unit files
            sudo tee /etc/systemd/system/www-api.service > /dev/null <<EOF
[Unit]
Description=socx API service
After=network.target

[Service]
Type=simple
User=$DEPLOY_USER
WorkingDirectory=/opt/apps/www/apps/api
Environment=API_PORT=3002
Environment=CORS_ORIGIN=*
ExecStart=$NODE_BIN src/index.js
Restart=on-failure
RestartSec=5

[Install]
WantedBy=multi-user.target
EOF

            sudo tee /etc/systemd/system/www-web.service > /dev/null <<EOF
[Unit]
Description=socx Web service
After=network.target

[Service]
Type=simple
User=$DEPLOY_USER
WorkingDirectory=/opt/apps/www/apps/web
ExecStart=$NPM_BIN run preview
Restart=on-failure
RestartSec=5

[Install]
WantedBy=multi-user.target
EOF

            sudo systemctl daemon-reload
            for svc in www-web www-api; do
              echo "Enabling and restarting $svc..."
              sudo systemctl enable "$svc"
              sudo systemctl restart "$svc"
              sudo systemctl status "$svc" --no-pager || true
            done
